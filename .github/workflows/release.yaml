name: Release

on:
  push:
    tags:
      # Matches v0.1.0, v1.2.3, etc. Pre-release tags (v1.0.0-alpha.1) are
      # intentionally excluded — add a second pattern if you want them.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write # required for gh release create

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          CLIFF_VERSION="2.7.0"
          curl -sSfL \
            "https://github.com/orhun/git-cliff/releases/download/v${CLIFF_VERSION}/git-cliff-${CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz --strip-components=1
          sudo mv git-cliff /usr/local/bin/

      - name: Detect pre-release
        id: flags
        run: |
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate release notes
        run: git-cliff --current --strip all -o RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "${{ steps.flags.outputs.prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "${{ github.ref_name }}" \
            --title "FoundationCore ${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md \
            $PRERELEASE_FLAG