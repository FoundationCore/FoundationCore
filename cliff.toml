[changelog]
header = """
# Changelog

All notable changes to FoundationCore are documented here.
Dates are in YYYY-MM-DD (ISO 8601). Versions follow [Semantic Versioning](https://semver.org).

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))
{% endfor %}\
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false

commit_parsers = [
    { message = "^feat",     group = "Features"       },
    { message = "^fix",      group = "Bug Fixes"      },
    { message = "^perf",     group = "Performance"    },
    { message = "^refactor", group = "Refactoring"    },
    { message = "^docs",     group = "Documentation"  },
    { message = "^test",     group = "Testing"        },
    { message = "^build",    group = "Build System"   },
    { message = "^ci",       group = "CI/CD"          },
    # chore and style commits are noise in a changelog
    { message = "^chore",    skip = true              },
    { message = "^style",    skip = true              },
]

protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"